let current = 0;

// Render cards
const container = document.getElementById('cards');
posts.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.onclick = () => openPopup(i);
  card.innerHTML = `
    <div class="card-header">
      <span><span class="num">#${i+1}</span><span class="source">${p.author}</span></span>
      <span class="time">${p.timestamp}</span>
    </div>
    <div class="headline">${p.text}</div>
  `;
  container.appendChild(card);
});

function openPopup(i) {
  current = i;
  render();
  document.getElementById('overlay').classList.add('active');
}

function closePopup() {
  document.getElementById('overlay').classList.remove('active');
}

function navigate(dir) {
  current = (current + dir + posts.length) % posts.length;
  render();
}

function render() {
  const p = posts[current];
  document.getElementById('p-source').textContent = p.author;
  document.getElementById('p-headline').textContent = p.text;
  document.getElementById('p-time').textContent = p.timestamp;
  document.getElementById('p-link').href = p.url;
  document.getElementById('p-counter').textContent = (current+1) + ' / ' + posts.length;
}

document.addEventListener('keydown', (e) => {
  if (!document.getElementById('overlay').classList.contains('active')) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') closePopup();
});
</script>
